<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Core — Sign Up</title>
  <link rel="stylesheet" href="biu-design.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet"/>
  <script src="biu-design.js" defer></script>
</head>
<body class="auth-body">

  <div class="animated-bg">
    <div class="animated-blob blob-1"></div>
    <div class="animated-blob blob-2"></div>
    <div class="animated-blob blob-3"></div>
  </div>

  <div class="liquid-wave">
    <svg viewBox="0 0 2880 96" preserveAspectRatio="none">
      <path class="wave-path" d="M0,60 C360,100 720,20 1440,60 C2160,100 2520,20 2880,60 L2880,0 L0,0 Z"/>
    </svg>
  </div>

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-avatar">
        <span class="material-symbols-rounded">person_add</span>
      </div>

      <h1 class="auth-title">Join the Hub</h1>
      <p class="auth-subtitle">Start your digital journey at Campus Core</p>

      <form id="signupForm">
        <div class="input-group">
          <span class="input-icon material-symbols-rounded">badge</span>
          <input type="text" class="form-input" id="regName" placeholder="Full Name" required>
        </div>

        <div class="input-group">
          <span class="input-icon material-symbols-rounded">mail</span>
          <input type="email" class="form-input" id="regEmail" placeholder="you@campuscore.edu" required>
        </div>

        <div class="input-group">
          <span class="input-icon material-symbols-rounded">lock</span>
          <input type="password" class="form-input" id="regPass" placeholder="Password" required>
        </div>

        <div class="input-group">
          <span class="input-icon material-symbols-rounded">school</span>
          <select class="form-input" id="regLevel">
            <option>100L</option>
            <option>200L</option>
            <option>300L</option>
            <option>400L</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="regBtn" style="margin-bottom:12px;">
          Create Account
        </button>
      </form>

      <div class="divider">OR</div>

      <button type="button" class="btn btn-secondary btn-full googleAuth">
        <span class="material-symbols-rounded">account_circle</span>
        Continue with Google
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login" class="auth-link">Sign In</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    async function syncUserToSheet(userData) {
      try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbyV44B-hKwqyIAb1uDmMiLJeFbcLI-lyF_-fKneF9WvVIXg373F7Vw5gLxPhyGV7-s1/exec', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData)
        });
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Sheet sync failed: ${response.status} ${response.statusText} ${errorText}`);
        }
        const result = await response.json();
        if (result.status !== 'success') {
          throw new Error(`Sheet sync returned failure: ${JSON.stringify(result)}`);
        }
      } catch (syncErr) {
        console.error('Google Sheets sync error:', syncErr);
        alert('Account created, but we could not sync to the welcome sheet. Please try again later.');
      }
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true;
      btn.textContent = 'Creating Account...';
      try {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPass').value;
        const level = document.getElementById('regLevel').value;

        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.sendEmailVerification();

        await db.ref('profiles/' + cred.user.uid).set({
          fullName: name,
          email,
          level,
          verified: false,
          createdAt: Date.now()
        });
        await db.ref('activities/' + cred.user.uid).push({
          title: 'Welcome to Campus Core',
          description: 'Your account has been created successfully.',
          timestamp: Date.now(),
          type: 'profile'
        });

        await syncUserToSheet({ name, email, level });

        alert('Account created! A verification email has been sent to your address. Please verify your email before signing in.');
        window.location.href = 'index';
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    document.querySelectorAll('.googleAuth').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          const result = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
          const user = result.user;
          const snap = await db.ref('profiles/' + user.uid).once('value');
          if (!snap.exists()) {
            const name = user.displayName || 'Campus Core Student';
            const email = user.email;
            const level = '100L';

            await db.ref('profiles/' + user.uid).set({
              fullName: name,
              email,
              level,
              verified: user.emailVerified,
              createdAt: Date.now()
            });
            await db.ref('activities/' + user.uid).push({
              title: 'Welcome to Campus Core',
              description: 'Signed in with Google and joined the campus network.',
              timestamp: Date.now(),
              type: 'profile'
            });
            await syncUserToSheet({ name, email, level });
          }
          window.location.href = 'index';
        } catch (err) {
          alert(err.message);
        }
      });
    });
  </script>
</body>
</html>
