<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Core — Chat</title>
  <link rel="stylesheet" href="biu-design.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet"/>
  <script src="biu-design.js" defer></script>
  <style>
    .chat-card { display:flex; flex-direction:column; height:calc(100vh - 200px); min-height:360px; }
    .chat-header { display:flex; align-items:center; gap:12px; padding-bottom:14px; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:14px; }
    .chat-peer-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#3f19e6,#0ea5e9); display:flex; align-items:center; justify-content:center; font-size:20px; color:white; font-weight:700; flex-shrink:0; }
    .chat-messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding-right:4px; }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-thumb { background:rgba(63,25,230,0.2); border-radius:9999px; }
    .msg-row { display:flex; gap:8px; align-items:flex-end; }
    .msg-row.mine { flex-direction:row-reverse; }
    .msg-av { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#3f19e6,#0ea5e9); display:flex; align-items:center; justify-content:center; font-size:14px; color:white; font-weight:700; flex-shrink:0; }
    .msg-av.mine-av { background:linear-gradient(135deg,#10b981,#0ea5e9); }
    .msg-bub { max-width:72%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5; }
    .msg-bub.theirs { background:rgba(255,255,255,0.25); backdrop-filter:blur(10px); color:var(--text-main); border-bottom-left-radius:4px; }
    [data-theme="dark"] .msg-bub.theirs { background:rgba(255,255,255,0.1); }
    .msg-bub.mine { background:linear-gradient(135deg,#3f19e6,#0ea5e9); color:white; border-bottom-right-radius:4px; }
    .msg-time { font-size:10px; color:var(--text-muted); margin-top:3px; text-align:right; }
    .chat-input-row { display:flex; gap:8px; margin-top:14px; border-top:1px solid rgba(255,255,255,0.1); padding-top:14px; }
    .chat-in { flex:1; padding:11px 16px; border-radius:var(--radius-md); border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.4); backdrop-filter:blur(10px); color:var(--text-main); font-family:inherit; font-size:14px; outline:none; }
    [data-theme="dark"] .chat-in { background:rgba(0,0,0,0.2); }
    .chat-in:focus { border-color:#3f19e6; box-shadow:0 0 0 3px rgba(63,25,230,0.12); }
    .chat-send { width:44px; height:44px; border-radius:var(--radius-md); border:none; background:linear-gradient(135deg,#3f19e6,#0ea5e9); color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform 0.15s; }
    .chat-send:hover { transform:scale(1.05); }
    .chat-send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-muted); gap:8px; }
  </style>
</head>
<body class="page-body">
  <div class="animated-bg">
    <div class="animated-blob blob-1"></div>
    <div class="animated-blob blob-2"></div>
    <div class="animated-blob blob-3"></div>
  </div>
  <header class="top-navbar">
    <a href="index.html" class="navbar-brand">Campus Core</a>
    <div class="navbar-actions">
      <button class="theme-toggle-btn" id="theme-toggle"><span class="material-symbols-rounded">light_mode</span></button>
      <button class="menu-btn" id="menu-btn"><span class="material-symbols-rounded">menu</span></button>
    </div>
  </header>
  <nav class="nav-dropdown" id="nav-dropdown">
    <a href="cgpa.html" class="dropdown-item">CGPA Calculator</a>
    <a href="assignment.html" class="dropdown-item">Assignments</a>
    <a href="discussions.html" class="dropdown-item">Discussions</a>
    <a href="download.html" class="dropdown-item">Downloads</a>
    <a href="news.html" class="dropdown-item">News Feed</a>
    <a href="pq.html" class="dropdown-item">Past Questions</a>
    <a href="subscriptions.html" class="dropdown-item">Subscriptions</a>
    <div class="dropdown-divider"></div>
    <a href="privacy.html" class="dropdown-item">Privacy Policy</a>
    <a href="support.html" class="dropdown-item">Support</a>
  </nav>
  <main class="main-content">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <button onclick="history.back()" style="width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-main);">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <h2 style="font-weight:700;font-size:20px;">Chat</h2>
    </div>

    <div class="glass-card chat-card">
      <div class="chat-header">
        <div class="chat-peer-avatar" id="peer-avatar">?</div>
        <div>
          <div style="font-weight:700;font-size:15px;" id="peer-name">Loading…</div>
          <div class="text-muted" style="font-size:12px;" id="peer-meta"></div>
        </div>
        <a id="view-profile-link" href="#" style="margin-left:auto;display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:#3f19e6;text-decoration:none;">
          <span class="material-symbols-rounded" style="font-size:18px;">person</span> Profile
        </a>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div class="empty-chat" id="empty-msg">
          <span class="material-symbols-rounded" style="font-size:36px;">chat_bubble_outline</span>
          <span>No messages yet. Say hello! 👋</span>
        </div>
      </div>

      <div class="chat-input-row">
        <input type="text" class="chat-in" id="msg-input" placeholder="Type a message…" maxlength="500">
        <button class="chat-send" id="send-btn" onclick="sendMsg()">
          <span class="material-symbols-rounded">send</span>
        </button>
      </div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="index,"><div class="nav-icon-wrap"><span class="material-symbols-rounded">home</span></div><span class="nav-label">Home</span></a>
    <a href="calendar.html" class="nav-item" data-page="calendar"><div class="nav-icon-wrap"><span class="material-symbols-rounded">calendar_month</span></div><span class="nav-label">Calendar</span></a>
    <a href="note.html" class="nav-item" data-page="note"><div class="nav-icon-wrap"><span class="material-symbols-rounded">book</span></div><span class="nav-label">Notes</span></a>
    <a href="chatbot.html" class="nav-item" data-page="chatbot"><div class="nav-icon-wrap"><span class="material-symbols-rounded">chat</span></div><span class="nav-label">AI Chat</span></a>
    <a href="profile.html" class="nav-item" data-page="profile"><div class="nav-icon-wrap"><span class="material-symbols-rounded">person</span></div><span class="nav-label">Profile</span></a>
  </nav>

  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const peerUid = new URLSearchParams(window.location.search).get('uid');
    let currentUser = null;
    let chatId = null;
    let myInitial = '?';
    let peerInitial = '?';

    function makeChatId(uid1, uid2) {
      return [uid1, uid2].sort().join('_');
    }

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'login.html'; return; }
      if (!peerUid) { window.location.href = 'profile.html'; return; }
      currentUser = user;
      chatId = makeChatId(user.uid, peerUid);

      const mySnap = await db.ref('profiles/' + user.uid).once('value');
      const myP = mySnap.val() || {};
      myInitial = (myP.fullName || user.email || 'M')[0].toUpperCase();

      const peerSnap = await db.ref('profiles/' + peerUid).once('value');
      const peerP = peerSnap.val() || {};
      peerInitial = (peerP.fullName || 'P')[0].toUpperCase();

      document.getElementById('peer-avatar').textContent = peerInitial;
      document.getElementById('peer-name').textContent = peerP.fullName || 'Student';
      document.getElementById('peer-meta').textContent = [peerP.level, peerP.department].filter(Boolean).join(' · ');
      document.getElementById('view-profile-link').href = 'viewprofile.html?uid=' + peerUid;
      document.title = 'Chat with ' + (peerP.fullName || 'Student') + ' — Campus Core';

      listenMessages();
    });

    function listenMessages() {
      db.ref('chats/' + chatId + '/messages').orderByChild('ts').limitToLast(80).on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('chat-messages');
        const empty = document.getElementById('empty-msg');

        if (!data) { empty.style.display = 'flex'; return; }
        empty.style.display = 'none';

        const msgs = Object.entries(data).sort((a, b) => a[1].ts - b[1].ts);
        container.innerHTML = '';

        msgs.forEach(([key, m]) => {
          const isMine = m.uid === currentUser.uid;
          const initial = isMine ? myInitial : peerInitial;
          const row = document.createElement('div');
          row.className = 'msg-row' + (isMine ? ' mine' : '');
          const time = new Date(m.ts).toLocaleTimeString('en-NG', { hour: '2-digit', minute: '2-digit' });
          row.innerHTML = `
            <div class="msg-av${isMine ? ' mine-av' : ''}">${initial}</div>
            <div>
              <div class="msg-bub ${isMine ? 'mine' : 'theirs'}">${escHtml(m.text)}</div>
              <div class="msg-time">${time}</div>
            </div>`;
          container.appendChild(row);
        });

        container.scrollTop = container.scrollHeight;
      });
    }

    async function sendMsg() {
      if (!currentUser || !chatId) return;
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      input.value = '';

      await db.ref('chats/' + chatId + '/messages').push({
        uid: currentUser.uid,
        text,
        ts: Date.now()
      });

      btn.disabled = false;
      input.focus();
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('msg-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
      });
    });

    function escHtml(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
