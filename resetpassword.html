<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Core — Reset Password</title>
  <link rel="stylesheet" href="biu-design.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet"/>
  <script src="biu-design.js" defer></script>
</head>
<body class="auth-body">
  <div class="animated-bg">
    <div class="animated-blob blob-1"></div>
    <div class="animated-blob blob-2"></div>
    <div class="animated-blob blob-3"></div>
  </div>
  <div class="liquid-wave">
    <svg viewBox="0 0 2880 96" preserveAspectRatio="none">
      <path class="wave-path" d="M0,60 C360,100 720,20 1440,60 C2160,100 2520,20 2880,60 L2880,0 L0,0 Z"/>
    </svg>
  </div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-avatar" style="background:linear-gradient(135deg,#f59e0b,#ef4444);">
        <span class="material-symbols-rounded">lock_reset</span>
      </div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">We'll send you a reset link</p>
      <form id="resetForm">
        <div class="input-group">
          <span class="input-icon material-symbols-rounded">mail</span>
          <input type="email" class="form-input" id="resetEmail" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="resetBtn" style="margin-bottom:12px;">
          Send Reset Link
        </button>
        <a href="login" class="btn btn-secondary btn-full" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;">
          Back to Sign In
        </a>
      </form>
      <div class="auth-footer" style="margin-top:16px;">
        Don't have an account? <a href="sign" class="auth-link">Sign Up</a>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script>
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    const auth = firebase.auth();
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.textContent = 'Sending...';
      try {
        await auth.sendPasswordResetEmail(document.getElementById('resetEmail').value);
        alert('Reset link sent! Check your inbox.');
        window.location.href = 'login';
      } catch (err) {
        alert(err.message);
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
