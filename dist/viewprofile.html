<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Core — View Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet"/>
  <script src="biu-design.js" defer></script>
  <link rel="stylesheet" crossorigin href="./assets/biu-design-BpEo5v7w.css">
</head>
<body class="page-body">
  <div class="animated-bg">
    <div class="animated-blob blob-1"></div>
    <div class="animated-blob blob-2"></div>
    <div class="animated-blob blob-3"></div>
  </div>
  <header class="top-navbar">
    <a href="index.html" class="navbar-brand">Campus Core</a>
    <div class="navbar-actions">
      <button class="theme-toggle-btn" id="theme-toggle"><span class="material-symbols-rounded">light_mode</span></button>
      <button class="menu-btn" id="menu-btn"><span class="material-symbols-rounded">menu</span></button>
    </div>
  </header>
  <nav class="nav-dropdown" id="nav-dropdown">
    <a href="cgpa.html" class="dropdown-item">CGPA Calculator</a>
    <a href="assignment.html" class="dropdown-item">Assignments</a>
    <a href="discussions.html" class="dropdown-item">Discussions</a>
    <a href="download.html" class="dropdown-item">Downloads</a>
    <a href="hall" class="dropdown-item">Hall of Fame</a>
    <a href="news.html" class="dropdown-item">News Feed</a>
    <a href="pq.html" class="dropdown-item">Past Questions</a>
    <a href="skillswap.html" class="dropdown-item">SkillSwap</a>
    <a href="subscriptions.html" class="dropdown-item">Subscriptions</a>
    <a href="admin.html" class="dropdown-item">Admin Panel</a>
    <div class="dropdown-divider"></div>
    <a href="privacy.html" class="dropdown-item">Privacy Policy</a>
    <a href="support.html" class="dropdown-item">Support</a>
  </nav>
  <main class="main-content">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <button onclick="history.back()" style="width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-main);">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <h2 style="font-weight:700;font-size:20px;">Student Profile</h2>
    </div>
    <div class="glass-card" id="profile-container" style="text-align:center;padding:32px;">
      <div class="profile-avatar" id="view-avatar">
        <span class="material-symbols-rounded">person</span>
      </div>
      <h3 id="view-name" style="font-size:22px;font-weight:700;margin-bottom:4px;">Loading…</h3>
      <p id="view-level" class="text-muted" style="font-size:14px;margin-bottom:20px;"></p>
      <div id="view-info"></div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="index,"><div class="nav-icon-wrap"><span class="material-symbols-rounded">home</span></div><span class="nav-label">Home</span></a>
    <a href="calendar.html" class="nav-item" data-page="calendar"><div class="nav-icon-wrap"><span class="material-symbols-rounded">calendar_month</span></div><span class="nav-label">Calendar</span></a>
    <a href="note.html" class="nav-item" data-page="note"><div class="nav-icon-wrap"><span class="material-symbols-rounded">book</span></div><span class="nav-label">Notes</span></a>
    <a href="chatbot.html" class="nav-item" data-page="chatbot"><div class="nav-icon-wrap"><span class="material-symbols-rounded">chat</span></div><span class="nav-label">AI Chat</span></a>
    <a href="profile.html" class="nav-item" data-page="profile"><div class="nav-icon-wrap"><span class="material-symbols-rounded">person</span></div><span class="nav-label">Profile</span></a>
  </nav>
  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    const db = firebase.database();

    const uid = new URLSearchParams(window.location.search).get('uid');
    if (uid) {
      db.ref('profiles/' + uid).once('value').then(snap => {
        if (snap.exists()) {
          const p = snap.val();
          document.getElementById('view-name').textContent = p.fullName || 'Unknown Student';
          document.getElementById('view-level').textContent = (p.department || 'Student') + ' · ' + (p.level || '');
          document.getElementById('view-info').innerHTML = `
            <div class="profile-row"><span class="material-symbols-rounded profile-row-icon" style="color:#3f19e6">mail</span><span>${p.email || 'Private'}</span></div>
            <div class="profile-row"><span class="material-symbols-rounded profile-row-icon" style="color:#10b981">school</span><span>${p.level || 'Level unknown'}</span></div>
            <div class="profile-row"><span class="material-symbols-rounded profile-row-icon" style="color:#06b6d4">home_work</span><span>${p.university || 'University not specified'}</span></div>
            <div class="profile-row"><span class="material-symbols-rounded profile-row-icon" style="color:#f59e0b">verified</span><span>${p.verified ? 'Verified Student' : 'Pending verification'}</span></div>
          `;
        } else {
          document.getElementById('view-name').textContent = 'Profile not found';
        }
      });
    } else {
      document.getElementById('view-name').textContent = 'No profile selected';
    }
  </script>
</body>
</html>
