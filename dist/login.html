<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Core — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet"/>
  <script src="biu-design.js" defer></script>
  <link rel="stylesheet" crossorigin href="./assets/biu-design-BpEo5v7w.css">
</head>
<body class="auth-body">

  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="animated-blob blob-1"></div>
    <div class="animated-blob blob-2"></div>
    <div class="animated-blob blob-3"></div>
  </div>

  <!-- Liquid Wave -->
  <div class="liquid-wave">
    <svg viewBox="0 0 2880 96" preserveAspectRatio="none">
      <path class="wave-path" d="M0,60 C360,100 720,20 1440,60 C2160,100 2520,20 2880,60 L2880,0 L0,0 Z"/>
    </svg>
  </div>

  <!-- Auth Form -->
  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-avatar">
        <span class="material-symbols-rounded">login</span>
      </div>

      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to Campus Core</p>

      <form id="loginForm">
        <div class="input-group">
          <span class="input-icon material-symbols-rounded">mail</span>
          <input type="email" class="form-input" id="loginEmail" placeholder="Email" required>
        </div>

        <div class="input-group">
          <span class="input-icon material-symbols-rounded">lock</span>
          <input type="password" class="form-input" id="loginPass" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn" style="margin-bottom:12px;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        <a href="sign.html" class="auth-link">Don't have an account? Sign up</a>
      </div>
      <div class="auth-footer" style="margin-top:8px;">
        <a href="resetpassword.html" class="auth-link" style="color:var(--text-muted);font-weight:400;">Forgot password?</a>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    const auth = firebase.auth();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const credential = await auth.signInWithEmailAndPassword(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPass').value
        );
        const user = credential.user;
        const db = firebase.database();
        const snap = await db.ref('profiles/' + user.uid).once('value');
        if (!snap.exists()) {
          await auth.signOut();
          throw new Error('Invalid user. Please sign up before signing in.');
        }
        window.location.href = 'index.html';
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
